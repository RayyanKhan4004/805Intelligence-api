<!DOCTYPE html>
<html>
<head>
  <title>Select Plan & Sign Up</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container py-5">
  <h2 class="text-center mb-4">Choose a Plan</h2>

  <div class="row" id="plans"></div>

  <form id="signup-form" class="mt-4">
    <input type="hidden" id="membership_id">

    <input class="form-control mb-3" id="username" placeholder="Username" required>
    <input class="form-control mb-3" id="email" placeholder="Email" required>
    <input type="password" class="form-control mb-3" id="password" placeholder="Password" required>

    <button class="btn btn-success w-100">Create Account</button>
  </form>

  <div id="message" class="mt-3"></div>
</div>

<script>
fetch('/api/memberships/')
.then(res => res.json())
.then(data => {
  let html = '';
  data.forEach(p => {
    html += `
      <div class="col-md-4">
        <div class="card p-3 text-center mb-3" onclick="selectPlan(${p.id})">
          <h4>${p.name}</h4>
          <p>₹${p.price}</p>
          <p>${p.description}</p>
        </div>
      </div>
    `;
  });
  document.getElementById('plans').innerHTML = html;
});

function selectPlan(id){
  document.getElementById('membership_id').value = id;
  alert("Plan selected");
}

document.getElementById('signup-form').addEventListener('submit', function(e){
  e.preventDefault();

  fetch('/api/signup/', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({
      username: username.value,
      email: email.value,
      password: password.value,
      membership_id: membership_id.value
    })
  })
  .then(res=>res.json())
  .then(data=>{
    if(data.message){
      document.getElementById('message').innerHTML =
        '<div class="alert alert-success">Account created successfully</div>';
    } else {
      document.getElementById('message').innerHTML =
        '<div class="alert alert-danger">Error occurred</div>';
    }
  });
});
</script>

</body>
</html>
